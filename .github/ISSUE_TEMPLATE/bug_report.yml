name: Bug Report
description: Report a reproducible bug in nuxt-rellax
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it quickly.

  - type: input
    id: version
    attributes:
      label: nuxt-rellax version
      placeholder: e.g. 1.2.0
    validations:
      required: true

  - type: input
    id: nuxt-version
    attributes:
      label: Nuxt version
      placeholder: e.g. 3.12.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        Please provide a minimal code snippet or a link to a repo/StackBlitz that reproduces the issue.
        The simpler the reproduction, the faster we can fix it.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any console errors or stack traces.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Browser, OS, any other relevant details.
