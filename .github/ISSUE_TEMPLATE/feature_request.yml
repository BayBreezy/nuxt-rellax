name: Feature Request
description: Suggest a new feature or improvement for nuxt-rellax
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your use case clearly so we can evaluate the request.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? What is your use case?
      placeholder: I'm trying to do X but currently I have to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the API or behavior you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative solutions you've tried?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, mockups, or references.
